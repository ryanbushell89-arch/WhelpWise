openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: WhelpWise Breeder Management Platform API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: dashboard
    description: Dashboard statistics
  - name: dogs
    description: Dog management
  - name: breeds
    description: Breed management
  - name: health-tests
    description: Health test tracking
  - name: heat-cycles
    description: Heat cycle tracking
  - name: progesterone
    description: Progesterone readings
  - name: breedings
    description: Breeding records
  - name: pregnancies
    description: Pregnancy tracking
  - name: litters
    description: Litter management
  - name: whelping
    description: Whelping records
  - name: puppies
    description: Puppy management
  - name: weights
    description: Puppy weight tracking
  - name: buyers
    description: Buyer management
  - name: budget
    description: Litter expense and budget tracking
  - name: stud-listings
    description: Stud directory listings
  - name: documents
    description: Document management
  - name: Storage
    description: Object storage upload and serving endpoints.

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # ─── Dashboard ───────────────────────────────────────────────────────────────
  /dashboard/stats:
    get:
      operationId: getDashboardStats
      tags: [dashboard]
      summary: Get dashboard statistics
      responses:
        "200":
          description: Dashboard stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardStats"

  /dashboard/alerts:
    get:
      operationId: getDashboardAlerts
      tags: [dashboard]
      summary: Get dashboard alerts
      responses:
        "200":
          description: Alert list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Alert"

  # ─── Breeds ──────────────────────────────────────────────────────────────────
  /breeds:
    get:
      operationId: listBreeds
      tags: [breeds]
      summary: List all breeds
      responses:
        "200":
          description: Breed list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Breed"

  /breeds/{breedId}/health-tests:
    get:
      operationId: getBreedHealthTests
      tags: [breeds]
      summary: Get required health tests for a breed
      parameters:
        - name: breedId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Health test requirements
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/BreedHealthTest"

  # ─── Dogs ────────────────────────────────────────────────────────────────────
  /dogs:
    get:
      operationId: listDogs
      tags: [dogs]
      summary: List all dogs
      parameters:
        - name: breed
          in: query
          schema:
            type: string
        - name: sex
          in: query
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
        - name: search
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Dog list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Dog"
    post:
      operationId: createDog
      tags: [dogs]
      summary: Create a new dog
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DogInput"
      responses:
        "201":
          description: Dog created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Dog"

  /dogs/{dogId}:
    get:
      operationId: getDog
      tags: [dogs]
      summary: Get a dog by ID
      parameters:
        - name: dogId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Dog
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Dog"
        "404":
          description: Not found
    patch:
      operationId: updateDog
      tags: [dogs]
      summary: Update a dog
      parameters:
        - name: dogId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DogUpdate"
      responses:
        "200":
          description: Updated dog
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Dog"
    delete:
      operationId: deleteDog
      tags: [dogs]
      summary: Delete a dog
      parameters:
        - name: dogId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /dogs/lookup:
    get:
      operationId: lookupDogs
      tags: [dogs]
      summary: Search dogs by name or registration number (for pedigree autocomplete)
      parameters:
        - name: q
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Matching dogs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Dog"

  /dogs/{dogId}/pedigree/{generations}:
    get:
      operationId: getDogPedigree
      tags: [dogs]
      summary: Get pedigree tree for a dog
      parameters:
        - name: dogId
          in: path
          required: true
          schema:
            type: integer
        - name: generations
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Pedigree tree with COI
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PedigreeTree"

  /dogs/{dogId}/pedigree:
    put:
      operationId: savePedigree
      tags: [dogs]
      summary: Save full 3-generation pedigree for a dog
      parameters:
        - name: dogId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PedigreeInput"
      responses:
        "200":
          description: Updated pedigree tree
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PedigreeTree"

  # ─── Health Tests ─────────────────────────────────────────────────────────────
  /dogs/{dogId}/health-tests:
    get:
      operationId: listDogHealthTests
      tags: [health-tests]
      summary: List health tests for a dog
      parameters:
        - name: dogId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Health test results
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/HealthTestResult"
    post:
      operationId: createHealthTest
      tags: [health-tests]
      summary: Add health test result
      parameters:
        - name: dogId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/HealthTestInput"
      responses:
        "201":
          description: Health test created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthTestResult"

  /dogs/{dogId}/health-tests/{testId}:
    patch:
      operationId: updateHealthTest
      tags: [health-tests]
      summary: Update a health test result
      parameters:
        - name: dogId
          in: path
          required: true
          schema:
            type: integer
        - name: testId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/HealthTestUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthTestResult"
    delete:
      operationId: deleteHealthTest
      tags: [health-tests]
      summary: Delete a health test result
      parameters:
        - name: dogId
          in: path
          required: true
          schema:
            type: integer
        - name: testId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ─── Heat Cycles ─────────────────────────────────────────────────────────────
  /dogs/{dogId}/heat-cycles:
    get:
      operationId: listHeatCycles
      tags: [heat-cycles]
      summary: List heat cycles for a dog
      parameters:
        - name: dogId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Heat cycles
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/HeatCycle"
    post:
      operationId: createHeatCycle
      tags: [heat-cycles]
      summary: Record a heat cycle
      parameters:
        - name: dogId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/HeatCycleInput"
      responses:
        "201":
          description: Heat cycle created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HeatCycle"

  /dogs/{dogId}/heat-cycles/{cycleId}:
    delete:
      operationId: deleteHeatCycle
      tags: [heat-cycles]
      summary: Delete a heat cycle
      parameters:
        - name: dogId
          in: path
          required: true
          schema:
            type: integer
        - name: cycleId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
    patch:
      operationId: updateHeatCycle
      tags: [heat-cycles]
      summary: Update a heat cycle
      parameters:
        - name: dogId
          in: path
          required: true
          schema:
            type: integer
        - name: cycleId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/HeatCycleUpdate"
      responses:
        "200":
          description: Updated heat cycle
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HeatCycle"

  # ─── Progesterone ─────────────────────────────────────────────────────────────
  /dogs/{dogId}/progesterone:
    get:
      operationId: listProgesteroneReadings
      tags: [progesterone]
      summary: List progesterone readings
      parameters:
        - name: dogId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Readings
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ProgesteroneReading"
    post:
      operationId: createProgesteroneReading
      tags: [progesterone]
      summary: Record a progesterone reading
      parameters:
        - name: dogId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProgesteroneInput"
      responses:
        "201":
          description: Reading created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProgesteroneReading"

  # ─── Storage ─────────────────────────────────────────────────────────────────
  /storage/uploads/request-url:
    post:
      tags: [Storage]
      operationId: requestUploadUrl
      summary: Request a presigned URL for file upload
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UploadUrlRequest'
      responses:
        '200':
          description: Presigned upload URL generated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UploadUrlResponse'
        '400':
          description: Missing or invalid required fields.
        '500':
          description: Failed to generate upload URL.
  /storage/objects/{objectPath}:
    get:
      tags: [Storage]
      operationId: getStorageObject
      summary: Serve an object entity from PRIVATE_OBJECT_DIR
      parameters:
        - name: objectPath
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Object content streamed.
          content:
            '*/*':
              schema:
                type: string
                format: binary

  # ─── Breedings ────────────────────────────────────────────────────────────────
  /breedings:
    get:
      operationId: listBreedings
      tags: [breedings]
      summary: List breeding records
      parameters:
        - name: dogId
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Breeding records
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Breeding"
    post:
      operationId: createBreeding
      tags: [breedings]
      summary: Create a breeding record
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BreedingInput"
      responses:
        "201":
          description: Breeding created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Breeding"

  /breedings/{breedingId}:
    get:
      operationId: getBreeding
      tags: [breedings]
      summary: Get a breeding record
      parameters:
        - name: breedingId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Breeding
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Breeding"
    patch:
      operationId: updateBreeding
      tags: [breedings]
      summary: Update a breeding record
      parameters:
        - name: breedingId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BreedingUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Breeding"

  # ─── Pregnancies ─────────────────────────────────────────────────────────────
  /breedings/{breedingId}/pregnancy:
    get:
      operationId: getPregnancy
      tags: [pregnancies]
      summary: Get pregnancy tracker for a breeding
      parameters:
        - name: breedingId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Pregnancy with milestones
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Pregnancy"

  # ─── Litters ─────────────────────────────────────────────────────────────────
  /litters:
    get:
      operationId: listLitters
      tags: [litters]
      summary: List all litters
      responses:
        "200":
          description: Litter list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Litter"
    post:
      operationId: createLitter
      tags: [litters]
      summary: Create a litter
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LitterInput"
      responses:
        "201":
          description: Litter created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Litter"

  /litters/{litterId}:
    get:
      operationId: getLitter
      tags: [litters]
      summary: Get a litter
      parameters:
        - name: litterId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Litter
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Litter"
    patch:
      operationId: updateLitter
      tags: [litters]
      summary: Update a litter
      parameters:
        - name: litterId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LitterUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Litter"
    delete:
      operationId: deleteLitter
      tags: [litters]
      summary: Delete a litter and all its puppies
      parameters:
        - name: litterId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ─── Whelping ─────────────────────────────────────────────────────────────────
  /litters/{litterId}/whelping:
    get:
      operationId: getWhelpingRecord
      tags: [whelping]
      summary: Get whelping record for a litter
      parameters:
        - name: litterId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Whelping record
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WhelpingRecord"
    post:
      operationId: createWhelpingRecord
      tags: [whelping]
      summary: Create whelping record
      parameters:
        - name: litterId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WhelpingInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WhelpingRecord"

  # ─── Puppies ─────────────────────────────────────────────────────────────────
  /litters/{litterId}/puppies:
    get:
      operationId: listPuppies
      tags: [puppies]
      summary: List puppies in a litter
      parameters:
        - name: litterId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Puppies
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Puppy"
    post:
      operationId: createPuppy
      tags: [puppies]
      summary: Add a puppy to a litter
      parameters:
        - name: litterId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PuppyInput"
      responses:
        "201":
          description: Puppy created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Puppy"

  /puppies:
    get:
      operationId: listPuppiesByBuyer
      tags: [puppies]
      summary: List puppies, filtered by buyer
      parameters:
        - name: buyerId
          in: query
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Puppies
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Puppy"

  /puppies/{puppyId}:
    get:
      operationId: getPuppy
      tags: [puppies]
      summary: Get a puppy
      parameters:
        - name: puppyId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Puppy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Puppy"
    delete:
      operationId: deletePuppy
      tags: [puppies]
      summary: Delete a puppy and all its records
      parameters:
        - name: puppyId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
    patch:
      operationId: updatePuppy
      tags: [puppies]
      summary: Update a puppy
      parameters:
        - name: puppyId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PuppyUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Puppy"

  # ─── Weights ─────────────────────────────────────────────────────────────────
  /puppies/{puppyId}/weights:
    get:
      operationId: listWeights
      tags: [weights]
      summary: List weight entries for a puppy
      parameters:
        - name: puppyId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Weight entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/WeightEntry"
    post:
      operationId: createWeight
      tags: [weights]
      summary: Record a weight entry
      parameters:
        - name: puppyId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WeightInput"
      responses:
        "201":
          description: Weight recorded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WeightEntry"

  # ─── Puppy Worming ───────────────────────────────────────────────────────────
  /puppies/{puppyId}/worming:
    get:
      operationId: listWorming
      tags: [worming]
      summary: List worming records for a puppy
      parameters:
        - name: puppyId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Worming records
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/WormingEntry"
    post:
      operationId: createWorming
      tags: [worming]
      summary: Add a worming record
      parameters:
        - name: puppyId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WormingInput"
      responses:
        "201":
          description: Worming record created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WormingEntry"

  /puppies/{puppyId}/worming/{wormingId}:
    delete:
      operationId: deleteWorming
      tags: [worming]
      summary: Delete a worming record
      parameters:
        - name: puppyId
          in: path
          required: true
          schema:
            type: integer
        - name: wormingId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ─── Puppy Vaccinations ───────────────────────────────────────────────────────
  /puppies/{puppyId}/vaccinations:
    get:
      operationId: listVaccinations
      tags: [vaccinations]
      summary: List vaccination records for a puppy
      parameters:
        - name: puppyId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Vaccination records
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/VaccinationEntry"
    post:
      operationId: createVaccination
      tags: [vaccinations]
      summary: Add a vaccination record
      parameters:
        - name: puppyId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VaccinationInput"
      responses:
        "201":
          description: Vaccination created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VaccinationEntry"

  /puppies/{puppyId}/vaccinations/{vaccinationId}:
    delete:
      operationId: deleteVaccination
      tags: [vaccinations]
      summary: Delete a vaccination record
      parameters:
        - name: puppyId
          in: path
          required: true
          schema:
            type: integer
        - name: vaccinationId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ─── Puppy Documents ──────────────────────────────────────────────────────────
  /puppies/{puppyId}/documents:
    get:
      operationId: listPuppyDocuments
      tags: [puppy-documents]
      summary: List documents for a puppy
      parameters:
