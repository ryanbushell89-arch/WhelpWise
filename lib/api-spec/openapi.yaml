components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    DashboardStats:
      type: object
      properties:
        totalDogs:
          type: integer
        activeLitters:
          type: integer
        totalPuppies:
          type: integer
        studListings:
          type: integer
        upcomingWhelpings:
          type: integer
        recentBreedings:
          type: integer
      required:
        - totalDogs
        - activeLitters
        - totalPuppies
        - studListings
        - upcomingWhelpings
        - recentBreedings

    Alert:
      type: object
      properties:
        id:
          type: string
        type:
          type: string
        message:
          type: string
        severity:
          type: string
          enum: [info, warning, urgent]
        relatedId:
          type: ["integer", "null"]
        relatedType:
          type: ["string", "null"]
      required:
        - id
        - type
        - message
        - severity

    Breed:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        group:
          type: ["string", "null"]
      required:
        - id
        - name

    BreedHealthTest:
      type: object
      properties:
        id:
          type: integer
        breedId:
          type: integer
        testName:
          type: string
        required:
          type: boolean
        description:
          type: ["string", "null"]
      required:
        - id
        - breedId
        - testName
        - required

    Dog:
      type: object
      properties:
        id:
          type: integer
        registeredName:
          type: string
        callName:
          type: string
        breedId:
          type: ["integer", "null"]
        breedName:
          type: ["string", "null"]
        sex:
          type: string
          enum: [male, female]
        dob:
          type: ["string", "null"]
        colour:
          type: ["string", "null"]
        microchip:
          type: ["string", "null"]
        registrationNumber:
          type: ["string", "null"]
        sireId:
          type: ["integer", "null"]
        sireName:
          type: ["string", "null"]
        damId:
          type: ["integer", "null"]
        damName:
          type: ["string", "null"]
        visibility:
          type: string
          enum: [private, public, stud]
        photoUrl:
          type: ["string", "null"]
        status:
          type: string
          enum: [active, retired, deceased]
        isExternal:
          type: boolean
        createdAt:
          type: string
      required:
        - id
        - registeredName
        - callName
        - sex
        - visibility
        - status
        - createdAt

    DogInput:
      type: object
      properties:
        registeredName:
          type: string
        callName:
          type: string
        breedId:
          type: ["integer", "null"]
        sex:
          type: string
          enum: [male, female]
        dob:
          type: ["string", "null"]
        colour:
          type: ["string", "null"]
        microchip:
          type: ["string", "null"]
        registrationNumber:
          type: ["string", "null"]
        sireId:
          type: ["integer", "null"]
        damId:
          type: ["integer", "null"]
        sire:
          $ref: "#/components/schemas/ParentInput"
        dam:
          $ref: "#/components/schemas/ParentInput"
        visibility:
          type: string
          enum: [private, public, stud]
        photoUrl:
          type: ["string", "null"]
      required:
        - registeredName
        - callName
        - sex
        - visibility

    DogUpdate:
      type: object
      properties:
        registeredName:
          type: string
        callName:
          type: string
        breedId:
          type: ["integer", "null"]
        sex:
          type: string
          enum: [male, female]
        dob:
          type: ["string", "null"]
        colour:
          type: ["string", "null"]
        microchip:
          type: ["string", "null"]
        registrationNumber:
          type: ["string", "null"]
        sireId:
          type: ["integer", "null"]
        damId:
          type: ["integer", "null"]
        visibility:
          type: string
          enum: [private, public, stud]
        photoUrl:
          type: ["string", "null"]
        status:
          type: string
          enum: [active, retired, deceased]

    PedigreeNode:
      type: object
      properties:
        id:
          type: ["integer", "null"]
        registeredName:
          type: string
        callName:
          type: ["string", "null"]
        registrationNumber:
          type: ["string", "null"]
        sex:
          type: ["string", "null"]
        breedName:
          type: ["string", "null"]
        photoUrl:
          type: ["string", "null"]
        isExternal:
          type: ["boolean", "null"]
        sire:
          $ref: "#/components/schemas/PedigreeNode"
        dam:
          $ref: "#/components/schemas/PedigreeNode"
      required:
        - registeredName

    ParentInput:
      type: object
      description: Full details for a sire or dam. If registrationNumber matches an existing dog it is linked automatically; otherwise an external stub is created with the provided fields.
      properties:
        registeredName:
          type: string
        registrationNumber:
          type: ["string", "null"]
        microchip:
          type: ["string", "null"]
        sex:
          type: string
          enum: [male, female]
        dob:
          type: ["string", "null"]
        colour:
          type: ["string", "null"]
        breedId:
          type: ["integer", "null"]

    AncestorSlot:
      type: object
      description: A single ancestor slot in the pedigree editor
      properties:
        registeredName:
          type: ["string", "null"]
        registrationNumber:
          type: ["string", "null"]

