kind = "web"
previewPath = "/"
title = "WhelpWise"
version = "1.0.0"
id = "artifacts/whelpwise"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23175

[services.development]
run = "pnpm --filter @workspace/whelpwise run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/whelpwise", "run", "build" ]
publicDir = "artifacts/whelpwise/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23175"
BASE_PATH = "/"
