version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: whelpwise
      POSTGRES_USER: whelpwise
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U whelpwise"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      args:
        VITE_CLERK_PUBLISHABLE_KEY: ${VITE_CLERK_PUBLISHABLE_KEY}
        BASE_PATH: ${BASE_PATH:-/}
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: "5000"
      APP_URL: ${APP_URL}
      DATABASE_URL: postgresql://whelpwise:${POSTGRES_PASSWORD:-changeme}@postgres:5432/whelpwise
      CLERK_SECRET_KEY: ${CLERK_SECRET_KEY}
      CLERK_PUBLISHABLE_KEY: ${CLERK_PUBLISHABLE_KEY}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET}
      GCS_KEYFILE_JSON: ${GCS_KEYFILE_JSON:-}
      GCS_BUCKET_NAME: ${GCS_BUCKET_NAME:-}
      PUBLIC_OBJECT_SEARCH_PATHS: ${PUBLIC_OBJECT_SEARCH_PATHS:-}
      PRIVATE_OBJECT_DIR: ${PRIVATE_OBJECT_DIR:-}
    ports:
      - "${HOST_PORT:-5000}:5000"

volumes:
  postgres_data:
